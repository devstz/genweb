<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Panel Login Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1241a1",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-100 dark:bg-background-dark min-h-screen flex items-center justify-center font-display">
<div class="w-full max-w-[1200px] px-6 py-12 flex flex-col items-center justify-center">
<div class="bg-white dark:bg-slate-900 w-full max-w-[500px] p-8 md:p-12 rounded-xl shadow-xl border border-slate-200 dark:border-slate-800">
<div class="flex flex-col items-center text-center gap-4 mb-10">
<div class="bg-primary/10 p-3 rounded-full mb-2">
<span class="material-symbols-outlined text-primary text-4xl">admin_panel_settings</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-black tracking-tight leading-tight">
                    Bot Admin Login
                </h1>
<p class="text-slate-500 dark:text-slate-400 text-base leading-relaxed">
                    Scan the QR code or click the button below to authorize via Telegram.
                </p>
</div>
<div class="flex flex-col items-center gap-8">
<div class="relative w-full max-w-[280px] aspect-square p-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-sm overflow-hidden group">
<div class="w-full h-full bg-center bg-no-repeat bg-cover rounded-lg opacity-90 transition-opacity group-hover:opacity-100" data-alt="Grayscale Telegram QR code for admin authorization" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuCQB56rZytzTkCbSJghsBydcxr03XrposVbimTVsKoa6lOdVLB4qVi09KkHrBvwQyGWJQzuYmed3mOspumvPssHPRobs60pran_pdD9Xz25PgoZRxhjn9zhmK1hA129ar15waHZkqLW9O6OXc8LyKZhIWnqDC8swkhMiNxI0uD00S-z94Zz8-LGvt4wob21fMwSLDGvnumv41opvJosRpuggGru-QGjQcncTLp95dKTKVaB5GnFUpSv4cUO0YlekP5C_kyDRBx3");'>
</div>
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="bg-white dark:bg-slate-900 p-2 rounded-lg shadow-md border border-slate-100 dark:border-slate-700">
<span class="material-symbols-outlined text-primary text-2xl">send</span>
</div>
</div>
</div>
<div class="w-full space-y-4">
<button class="w-full flex cursor-pointer items-center justify-center rounded-lg h-14 px-6 bg-slate-950 dark:bg-primary hover:bg-slate-800 dark:hover:bg-primary/90 text-white text-base font-bold leading-normal tracking-wide transition-all shadow-lg active:scale-[0.98]">
<span class="material-symbols-outlined mr-2">login</span>
<span class="truncate uppercase">LOGIN VIA TELEGRAM</span>
</button>
<div class="flex items-center justify-center gap-2 pt-4 border-t border-slate-100 dark:border-slate-800">
<span class="material-symbols-outlined text-slate-400 text-sm">lock</span>
<p class="text-slate-400 dark:text-slate-500 text-xs font-medium uppercase tracking-widest">
                            Secure access for administrators only
                        </p>
</div>
</div>
</div>
</div>
<div class="mt-8 flex gap-6 text-slate-400 dark:text-slate-600">
<a class="text-xs hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="text-xs hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="text-xs hover:text-primary transition-colors" href="#">Help Center</a>
</div>
</div>
